esphome:
  name: dreo-htf018s
  friendly_name: "Dreo HTF018S"

external_components:
  - source: github://davidc/dreo-protocol

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Logging
logger:

# Home Assistant API
api:
  encryption:
    key: !secret dreo_htf018s_api_key

# OTA upgrades
ota:
  - platform: esphome
    password: !secret dreo_htf018s_ota_password

# WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot (captive portal)
  ap:
    ssid: "Dreo-HTF018S"
    password: "12345678"

captive_portal:

# Enable UART
uart:
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 115200
  # debug:

# Enable Dreo MCU protocol via UART
dreo:

sensor:
  - id: current_temperature
    name: "Current Temperature"
    platform: dreo
    sensor_datapoint: 11
    device_class: temperature
    unit_of_measurement: °F

switch:
  - id: power
    name: "Power"
    platform: dreo
    switch_datapoint: 1
    disabled_by_default: true # Disabled by default because it's also available via the fan entity
  - id: display_always_on
    name: "Display Always On"
    platform: dreo
    switch_datapoint: 2
  - id: beeper
    name: "Beeper"
    platform: dreo
    switch_datapoint: 5
  - id: oscillation
    name: "Oscillation"
    platform: dreo
    switch_datapoint: 8
    disabled_by_default: true # Disabled by default because it's also available via the fan entity

select:
  - id: mode
    name: "Mode"
    platform: dreo
    enum_datapoint: 3
    options:
      1: Normal
      2: Natural
      3: Sleep
      4: Auto

number:
  - id: fan_speed
    name: "Fan Speed"
    platform: dreo
    number_datapoint: 4
    min_value: 1
    max_value: 9
    step: 1
    disabled_by_default: true # Disabled by default because it's also available via the fan entity

    # TODO, not working, see what the app sends, also see what the max value is
  - id: auto_off_timer
    name: "Auto Off Timer"
    platform: dreo
    number_datapoint: 6
    min_value: 0
    max_value: 719 # 11 hours 59 minutes is the max in the app
    step: 1

fan:
  - id: fan_entity
    name: "Fan"
    platform: dreo
    restore_mode: RESTORE_DEFAULT_OFF
    switch_datapoint: 1
    speed_datapoint: 4
    speed_count: 9
    oscillation_datapoint: 8
